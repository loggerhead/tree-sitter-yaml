name: publish-crate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Read package metadata
        id: meta
        shell: bash
        run: |
          echo "name=$(sed -n 's/^name = \"\\(.*\\)\"/\\1/p' Cargo.toml | head -n1)" >> "$GITHUB_OUTPUT"
          echo "version=$(sed -n 's/^version = \"\\(.*\\)\"/\\1/p' Cargo.toml | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Check tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          test "${GITHUB_REF_NAME}" = "v${{ steps.meta.outputs.version }}"

      - name: Verify package
        run: cargo publish --dry-run

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish
